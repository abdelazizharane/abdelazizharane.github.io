name: Deploy Quarto Site → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── R ────────────────────────────────────────────────────
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4.2.3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('setup.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: |
          install.packages(c(
            "knitr", "rmarkdown", "quarto",
            "tidyverse", "ggplot2", "plotly",
            "DT", "gt", "kableExtra",
            "leaflet", "htmlwidgets",
            "jsonlite", "yaml", "here"
          ), repos = "https://cloud.r-project.org", quiet = TRUE)
        shell: Rscript {0}

      # ── Python (sans pip cache — pas de requirements.txt) ────
      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          # pas de cache: 'pip' ici — évite le warning "no requirements.txt"

      - name: Install Python packages
        run: pip install jupyter matplotlib numpy pandas seaborn

      # ── Quarto ───────────────────────────────────────────────
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'release'

      # ── Cache _freeze ────────────────────────────────────────
      - name: Restore _freeze cache
        uses: actions/cache@v4.2.3
        with:
          path: _freeze
          key: freeze-${{ runner.os }}-${{ hashFiles('**/*.qmd') }}
          restore-keys: freeze-${{ runner.os }}-

      # ── Build ────────────────────────────────────────────────
      - name: Render site
        run: quarto render

      # ── Upload ───────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: '_site'

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
