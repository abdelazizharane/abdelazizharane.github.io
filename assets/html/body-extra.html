<!-- Scroll-to-top button -->
<button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"
  aria-label="Retour en haut"
  style="
    display:none; position:fixed; bottom:1.5rem; right:1.5rem;
    width:40px; height:40px; border-radius:50%;
    background:var(--h-green,#1B5E3B); color:#fff;
    border:none; cursor:pointer; font-size:1.1rem;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    z-index:999; transition:opacity .2s;
  ">↑</button>

<script>
// Scroll-to-top visibility
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  if (btn) btn.style.display = window.scrollY > 400 ? 'block' : 'none';
});

// Active nav link on scroll (sections dans la home)
if (window.location.pathname === '/' || window.location.pathname.endsWith('index.html')) {
  const sections = document.querySelectorAll('section[id]');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll('.sidebar-nav a').forEach(a => {
          a.classList.toggle('active', a.getAttribute('href') === '#' + id);
        });
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });
  sections.forEach(s => observer.observe(s));
}

// Plausible Analytics (privacy-friendly, auto-hébergé — à configurer)
// window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }
</script>
